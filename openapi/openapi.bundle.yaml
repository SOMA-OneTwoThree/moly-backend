  /webhooks/ad-ssv:
    get:
      tags:
      - ads
      summary: AdMob server-side verification callback
      description: 공개 HTTP endpoint지만 Google ECDSA signature가 권한 경계다. signature 통과 후 영구 실패/중복도 Google
        재시도를 피하기 위해 항상 200이고 result로 구분한다. verifier key timeout은 10초, cache TTL은 24시간이다. 추가 query는 허용되며
        signature 앞 원본 query에 있으면 서명 대상에 포함된다.
      operationId: handleAdMobSsv
      responses:
        '200':
          description: SSV 처리 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdSsvResponse'
        '500':
          $ref: '#/components/responses/Internal'
        '422':
          description: 필수 query 누락/empty 또는 Google SSV signature/key 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                missing:
                  summary: parameter 누락
                  value:
                    error:
                      code: VALIDATION
                      message: SSV 파라미터가 누락됐어요.
                      details: {}
                signature:
                  summary: signature 실패
                  value:
                    error:
                      code: AD_VERIFY_FAILED
                      message: 광고 시청 확인에 실패했어요.
                      details: {}
      security:
      - AdMobSsvSignature: []
      parameters:
      - name: key_id
        in: query
        required: true
        description: Google verifier 공개키 식별자. non-empty string만 검사한다.
        schema:
          type: string
          minLength: 1
      - name: custom_data
        in: query
        required: true
        description: 발급된 reward_session_id. UUID가 아니면 signature 통과 후 200 result=invalid_session.
        schema:
          type: string
          minLength: 1
      - name: transaction_id
        in: query
        required: true
        description: AdMob SSV transaction id. unique 멱등 key.
        schema:
          type: string
          minLength: 1
