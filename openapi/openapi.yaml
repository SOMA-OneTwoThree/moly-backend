x-source-of-truth:
  contract: openapi/openapi.yaml
  generated_bundle: openapi/openapi.bundle.yaml
  conformance_targets:
  - app/main.py
  - app/api/*.py
  - app/schemas/*.py
  - app/services/*.py
  - app/core/security.py
  - app/core/errors.py
  - db/schema.sql
x-global-error-behavior:
  not_found:
    status: 404
    code: NOT_FOUND
    message: Not Found
