openapi: 3.1.0
info:
  title: moly-backend API
  version: 1.0.0
  summary: Moly 앱 백엔드 API 계약
  description: '이 문서는 moly-backend 공개 HTTP API의 확정 계약이다. 호환성에 영향을 주는 변경은 Semantic Versioning으로
    관리한다. 보호 API는 Supabase access token Bearer 인증을 사용한다. 서버 자체 문서 URL(`/openapi.json`, `/docs`,
    `/redoc`)은 비활성화되어 있다.


    애플리케이션 오류, 요청 검증 오류, 등록되지 않은 path의 404, 등록된 path의 미지원 method 405, 미처리 예외 500은 모두 `ErrorEnvelope`로
    반환된다. 깨진 JSON과 비객체 body를 포함한 요청 검증 실패는 400이 아니라 422다.


    날짜 경계는 도메인마다 다르다. 채팅 token과 일기 귀속의 `activity_date`는 사용자 local 04:00, 출석·루틴·광고 보상의 기준일은 사용자 local 00:00이다.
    `/charging-station.activity_date` 필드명은 레거시이며 실제 의미는 00:00 경계 reward date다.


    local 환경 전용 `/dev/*` 라우터와 moly-auth 소유 계정 API(`/me` 포함)는 이 계약 범위 밖이다.'
