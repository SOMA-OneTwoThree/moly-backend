          items:
            anyOf:
            - type: string
            - type: integer
          description: body/query/path/header와 field path를 포함한 오류 위치.
        type:
          type: string
        msg:
          type: string
    ErrorDetails:
      type: object
      additionalProperties: true
      description: 오류별 부가 정보. 일반 오류는 빈 object다. 요청 model 검증은 errors, 잔액 부족은 required/balance, 일부 validation은
        context/product_id/slot 등을 담는다.
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
        required:
          type: integer
        balance:
          type: integer
        context: {}
        product_id:
          anyOf:
          - type: string
          - type: 'null'
        slot:
          type: string
          enum:
          - theme
          - head
          - neck
          - body
