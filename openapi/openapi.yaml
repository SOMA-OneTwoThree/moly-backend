  method_not_allowed:
    status: 405
    code: METHOD_NOT_ALLOWED
    message: Method Not Allowed
    condition: 등록된 path의 미지원 HTTP method
  unhandled:
    status: 500
    code: INTERNAL
    message: 일시적인 오류가 발생했어요. 잠시 후 다시 시도해 주세요.
    condition: DB, 외부 API, 응답 직렬화 등을 포함한 미처리 예외
